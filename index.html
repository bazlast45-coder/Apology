<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>...</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;

  /* soft pink aesthetic */
  background: linear-gradient(135deg, #ffc1cc, #ffe4ec, #ffd6e0);
}

/* Center card */
.card {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 50px 40px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* ENTER button */
#enterBtn {
  padding: 16px 50px;
  font-size: 20px;
  border-radius: 999px;
  border: 2px solid #ff9bb3;
  background: rgba(255,255,255,0.6);
  color: #ff6f91;
  cursor: pointer;
  transition: 0.3s;

  transform: scale(0);
  animation: zoomIn 2s forwards;
}

#enterBtn:hover {
  background: #ff9bb3;
  color: white;
  transform: scale(1.05);
}

/* Animation */
@keyframes zoomIn {
  to { transform: scale(1); }
}

/* Popup full screen */
#popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

/* Text */
#popupText {
  position: absolute;
  top: 20%;
  width: 100%;
  text-align: center;
  font-size: 24px;
  color: #444;
}

/* Buttons floating */
.popup-btn {
  position: absolute;
  padding: 12px 25px;
  border-radius: 999px;
  border: none;
  cursor: pointer;
  font-size: 16px;
}

/* Colors */
.yes {
  background: #2ed573;
  color: white;
}

.no {
  background: #ff4757;
  color: white;
}
</style>
</head>

<body>

<!-- FIRST SCREEN -->
<div class="card">
  <button id="enterBtn" onclick="openPopup()">ENTER 💌</button>
</div>

<!-- POPUP -->
<div id="popup">
  <div id="popupText">Can I show you something important?</div>

  <!-- Initial buttons -->
  <button class="popup-btn yes" style="top:60%; left:40%;" onclick="goNext()">Yes</button>
  <button class="popup-btn no" style="top:60%; left:55%;" onclick="addYes()">No</button>
</div>

<script>
let clickCount = 0;

function openPopup() {
  document.getElementById("popup").style.display = "block";
  document.querySelector(".card").style.display = "none";
}

function addYes() {
  clickCount++;

  let amount = 2;
  if (clickCount === 2) amount = 4;
  if (clickCount >= 3) amount = 8;

  for (let i = 0; i < amount; i++) {
    let btn = document.createElement("button");
    btn.innerText = "Yes";
    btn.className = "popup-btn yes";
    btn.onclick = goNext;

    /* random position */
    btn.style.top = Math.random() * 80 + "%";
    btn.style.left = Math.random() * 80 + "%";

    document.getElementById("popup").appendChild(btn);
  }
}

function goNext() {
  window.location.href = "page1.html";
}
</script>

</body>
</html>
