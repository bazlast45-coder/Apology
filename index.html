<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ffd6e0, #ffeef3);
  text-align: center;
  overflow: hidden;
}

/* Heading */
h1 {
  margin-top: 100px;
  font-size: 42px;
  color: #444;
}

/* Button */
#enterBtn {
  margin-top: 40px;
  padding: 15px 35px;
  font-size: 18px;
  border: none;
  border-radius: 30px;
  background: #ff6b81;
  color: white;
  cursor: pointer;
  transform: scale(0);
  animation: zoomIn 3s forwards;
}

@keyframes zoomIn {
  0% { transform: scale(0); }
  100% { transform: scale(1); }
}

/* Popup */
#popup {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  width: 260px;
}

.popup-buttons button {
  margin: 8px;
  padding: 10px 18px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
}

.yes {
  background: #2ed573;
  color: white;
}

.no {
  background: #ff4757;
  color: white;
}

/* Gallery */
#gallery {
  display: none;
  margin-top: 60px;
}

img {
  width: 120px;
  margin: 10px;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
}

img:hover {
  transform: scale(1.1);
}
</style>
</head>

<body>

<h1>I am sorry</h1>

<button id="enterBtn" onclick="openPopup()">Enter 💌</button>

<!-- POPUP -->
<div id="popup">
  <p>Can I show you something important?</p>
  <div class="popup-buttons" id="btnContainer">
    <button class="yes" onclick="goNext()">Yes</button>
    <button class="no" onclick="multiplyYes()">No</button>
  </div>
</div>

<!-- GALLERY -->
<div id="gallery">
  <h2>Pick one 💭</h2>
  <img src="https://via.placeholder.com/120" onclick="openPage(1)">
  <img src="https://via.placeholder.com/120" onclick="openPage(2)">
  <img src="https://via.placeholder.com/120" onclick="openPage(3)">
</div>

<script>
function openPopup() {
  document.getElementById("popup").style.display = "block";
}

function multiplyYes() {
  let container = document.getElementById("btnContainer");

  let btn = document.createElement("button");
  btn.innerText = "Yes";
  btn.className = "yes";
  btn.onclick = goNext;

  container.appendChild(btn);
}

function goNext() {
  document.getElementById("popup").style.display = "none";
  document.getElementById("enterBtn").style.display = "none";
  document.getElementById("gallery").style.display = "block";
}

function openPage(num) {
  window.location.href = "page" + num + ".html";
}
</script>

</body>
  </html>
